<svg viewBox="0 0 880 250" width="880" height="250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rehabilitation Bicycle Force Measurement System">
  <defs>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#141c26" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    .silks { font-family:'Cascadia Code','JetBrains Mono',Consolas,'Malgun Gothic',monospace; }
    .kr    { font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif; }
    .ledR  { animation:blink 0.8s steps(1,end) infinite; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:.12} }
    .tile  { animation:breathe 3s ease-in-out infinite; }
    .t1 { animation-delay:-.2s; } .t2 { animation-delay:-.9s; } .t3 { animation-delay:-1.6s; }
    .t4 { animation-delay:-.5s; } .t5 { animation-delay:-1.2s; } .t6 { animation-delay:-2.1s; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.55} }
    @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
  </style>

  <rect x="1" y="1" width="878" height="248" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <rect x="676" y="24" width="140" height="22" rx="11" fill="#161b22" stroke="#3a4654"/>
  <text x="746" y="39" text-anchor="middle" class="silks" font-size="11" fill="#58e6ff" letter-spacing="1">4CH DAQ SYSTEM</text>
  <circle class="ledR" cx="840" cy="35" r="4" fill="#58a6ff"/>

  <text x="32" y="43" class="silks" font-size="20" font-weight="700" fill="#ffc861">Rehabilitation Bicycle Force Measurement System</text>
  <text x="32" y="66" class="kr" font-size="13" fill="#8b949e">ESP32 Feather V2 기반 4채널 로드셀 동기화 수집 시스템 — 재활운동 힘 데이터 실시간 모니터링</text>

  <!-- device screen: web dashboard readout, styled like the sibling scope/logic panels -->
  <rect x="32" y="82" width="300" height="140" rx="4" fill="#0a0e13" stroke="#263238"/>
  <rect x="32" y="82" width="300" height="140" rx="4" fill="url(#grid2)"/>
  <text x="44" y="97" class="silks" font-size="9" fill="#4d5966" letter-spacing="1">WEB DASHBOARD · LIVE MONITORING</text>

  <!-- 2x3 metric tile grid -->
  <g class="silks" font-weight="700">
    <!-- row 1: arms -->
    <g class="tile t1">
      <rect x="40" y="102" width="139" height="32" rx="4" fill="#161b22" stroke="#3a4654" stroke-width="1.2"/>
      <circle cx="49" cy="111" r="2.4" fill="#ffc861"/>
      <text x="55" y="114" font-size="6.5" fill="#8b949e" letter-spacing=".3">LEFT ARM</text>
      <text x="49" y="128" font-size="10.5" fill="#ffc861">0.000 Kg</text>
    </g>
    <g class="tile t2">
      <rect x="185" y="102" width="139" height="32" rx="4" fill="#161b22" stroke="#3a4654" stroke-width="1.2"/>
      <circle cx="194" cy="111" r="2.4" fill="#58e6ff"/>
      <text x="200" y="114" font-size="6.5" fill="#8b949e" letter-spacing=".3">RIGHT ARM</text>
      <text x="194" y="128" font-size="10.5" fill="#58e6ff">0.000 Kg</text>
    </g>
    <!-- row 2: legs -->
    <g class="tile t3">
      <rect x="40" y="141" width="139" height="32" rx="4" fill="#161b22" stroke="#3a4654" stroke-width="1.2"/>
      <circle cx="49" cy="150" r="2.4" fill="#3fb950"/>
      <text x="55" y="153" font-size="6.5" fill="#8b949e" letter-spacing=".3">LEFT LEG</text>
      <text x="49" y="167" font-size="10.5" fill="#3fb950">0.000 Kg</text>
    </g>
    <g class="tile t4">
      <rect x="185" y="141" width="139" height="32" rx="4" fill="#161b22" stroke="#3a4654" stroke-width="1.2"/>
      <circle cx="194" cy="150" r="2.4" fill="#ff7b72"/>
      <text x="200" y="153" font-size="6.5" fill="#8b949e" letter-spacing=".3">RIGHT LEG</text>
      <text x="194" y="167" font-size="10.5" fill="#ff7b72">0.000 Kg</text>
    </g>
    <!-- row 3: angle + stopwatch -->
    <g class="tile t5">
      <rect x="40" y="180" width="139" height="32" rx="4" fill="#161b22" stroke="#3a4654" stroke-width="1.2"/>
      <circle cx="49" cy="189" r="2.4" fill="#ffc861"/>
      <text x="55" y="192" font-size="6.5" fill="#8b949e" letter-spacing=".3">ANGLE</text>
      <text x="49" y="206" font-size="10.5" fill="#ffc861">0.00 °</text>
    </g>
    <g class="tile t6">
      <rect x="185" y="180" width="139" height="32" rx="4" fill="#161b22" stroke="#3a4654" stroke-width="1.2"/>
      <circle cx="194" cy="189" r="2.4" fill="#58e6ff"/>
      <text x="200" y="192" font-size="6.5" fill="#8b949e" letter-spacing=".3">STOPWATCH</text>
      <text x="194" y="206" font-size="10.5" fill="#58e6ff">00 : 00</text>
    </g>
  </g>
  <text x="316" y="219" text-anchor="end" class="silks" font-size="9" fill="#4d5966">LIVE · 6 METRICS</text>

  <!-- specs -->
  <g class="silks" font-size="12" fill="#c9d1d9">
    <text x="356" y="103"><tspan fill="#ffc861">▸</tspan> 4× ADS1232 interrupt-driven SPI</text>
    <text x="356" y="127"><tspan fill="#ffc861">▸</tspan> Channel-synchronized acquisition</text>
    <text x="356" y="151"><tspan fill="#ffc861">▸</tspan> 2MB PSRAM extended data logging</text>
    <text x="634" y="103"><tspan fill="#58e6ff">▸</tspan> SPIFFS + WebSocket monitoring</text>
    <text x="634" y="127"><tspan fill="#58e6ff">▸</tspan> Text / Binary selectable storage</text>
    <text x="634" y="151"><tspan fill="#58e6ff">▸</tspan> Datasheet-driven part selection</text>
  </g>

  <text x="356" y="230" class="silks" font-size="9.5" fill="#4d5966" letter-spacing="1">MODULE 02 · REHAB / DAQ · ESP32 FEATHER V2</text>
</svg>
