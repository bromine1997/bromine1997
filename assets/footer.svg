<svg viewBox="0 0 880 84" width="880" height="84" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="footer">
  <defs>
    <clipPath id="hb"><rect x="20" y="4" width="840" height="44"/></clipPath>
    <!-- ECG period 220px, repeated 6x = 1320px -->
    <path id="ecg" d="M0 0 h60 l8 -5 l6 5 h20 l6 -24 l8 32 l6 -8 h40 q10 -8 20 0 h46 h60 l8 -5 l6 5 h20 l6 -24 l8 32 l6 -8 h40 q10 -8 20 0 h46 h60 l8 -5 l6 5 h20 l6 -24 l8 32 l6 -8 h40 q10 -8 20 0 h46 h60 l8 -5 l6 5 h20 l6 -24 l8 32 l6 -8 h40 q10 -8 20 0 h46 h60 l8 -5 l6 5 h20 l6 -24 l8 32 l6 -8 h40 q10 -8 20 0 h46 h60 l8 -5 l6 5 h20 l6 -24 l8 32 l6 -8 h40 q10 -8 20 0 h46" fill="none"/>
  </defs>
  <style>
    .silks { font-family:'Cascadia Code','JetBrains Mono',Consolas,'Malgun Gothic',monospace; }
    .ecg { stroke:#3fb950; stroke-width:2; stroke-linecap:round; animation:beat 4s linear infinite; }
    @keyframes beat { from{transform:translateX(0)} to{transform:translateX(-220px)} }
    .cursor { animation:blink 1s steps(1,end) infinite; }
    @keyframes blink { 0%,55%{opacity:1} 56%,100%{opacity:0} }
    .led { animation:breathe 2.4s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.4} }
    @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
  </style>

  <g clip-path="url(#hb)">
    <g transform="translate(20 34)"><use href="#ecg" class="ecg"/></g>
  </g>
  <g fill="#0d1117" stroke="#b58b3c" stroke-width="2">
    <circle cx="16" cy="34" r="4"/><circle cx="864" cy="34" r="4"/>
  </g>

  <circle class="led" cx="40" cy="68" r="4.5" fill="#3fb950"/>
  <text x="52" y="72" class="silks" font-size="10" fill="#4d5966">SYSTEM ONLINE · UPTIME ∞</text>
  <text x="440" y="72" text-anchor="middle" class="silks" font-size="13" fill="#8b949e">// EOF — 방문해 주셔서 감사합니다 · Thanks for visiting</text>
  <rect class="cursor" x="668" y="59" width="8" height="16" fill="#58e6ff"/>
</svg>
