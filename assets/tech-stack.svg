<svg viewBox="0 0 880 310" width="880" height="310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech Stack">
  <defs>
    <pattern id="dots2" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1b232e"/>
    </pattern>
    <path id="bus" d="M60 140 L820 140"/>
    <path id="busR" d="M820 140 L60 140"/>
  </defs>
  <style>
    .silks { font-family:'Cascadia Code','JetBrains Mono',Consolas,'Malgun Gothic',monospace; }
    .trace { fill:none; stroke:#5a4426; stroke-width:2.2; stroke-linecap:round; }
    .thin  { stroke-width:1.8; }
    .p  { fill:none; stroke-width:2.2; stroke-linecap:round; stroke-dasharray:26 1000; stroke-dashoffset:1026; animation:flow linear infinite; }
    .pg { stroke-width:7; opacity:.2; }
    @keyframes flow { to { stroke-dashoffset:0; } }
    .amber { stroke:#ffc861; } .cyan { stroke:#58e6ff; }
    .b1 { animation-duration:3.6s; animation-delay:-0.4s; }
    .b2 { animation-duration:4.4s; animation-delay:-2.4s; }
    .v1 { fill:none; stroke:#ffc861; stroke-width:2; stroke-dasharray:10 200; stroke-dashoffset:210; animation:flow 2.2s linear infinite; }
    .v2 { fill:none; stroke:#58e6ff; stroke-width:2; stroke-dasharray:10 200; stroke-dashoffset:210; animation:flow 2.8s linear infinite; animation-delay:-1.3s; }
    .chip  { fill:#161b22; stroke:#3a4654; stroke-width:1.5; }
    .glowA { animation:breathe 3.4s ease-in-out infinite; }
    .glowB { animation:breathe 3.4s ease-in-out infinite; animation-delay:-1.7s; }
    @keyframes breathe { 0%,100%{opacity:.09} 50%{opacity:.02} }
    .led1 { animation:blink 1.3s steps(1,end) infinite; }
    .led2 { animation:blink 0.9s steps(1,end) infinite; animation-delay:-.5s; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:.12} }
    @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
  </style>

  <rect x="1" y="1" width="878" height="308" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect x="1" y="1" width="878" height="308" rx="14" fill="url(#dots2)"/>

  <!-- group label -->
  <text x="40" y="27" class="silks" font-size="11" fill="#4d5966" letter-spacing="2">── MCU ──────────────────────────</text>

  <!-- MCU bus -->
  <use href="#bus" class="trace"/>
  <use href="#bus" class="p pg amber b1"/><use href="#bus" class="p amber b1"/>
  <use href="#busR" class="p pg cyan b2"/><use href="#busR" class="p cyan b2"/>
  <g fill="#0d1117" stroke="#b58b3c" stroke-width="2">
    <circle cx="54" cy="140" r="4"/><circle cx="826" cy="140" r="4"/>
  </g>

  <!-- MCU chips -->
  <g>
    <!-- chip template x4 -->
    <g>
      <rect class="glowA" x="36" y="32" width="178" height="76" rx="8" fill="#ffc861"/>
      <g fill="#b58b3c">
        <rect x="55" y="24" width="6" height="12" rx="1"/><rect x="85" y="24" width="6" height="12" rx="1"/><rect x="115" y="24" width="6" height="12" rx="1"/><rect x="145" y="24" width="6" height="12" rx="1"/><rect x="175" y="24" width="6" height="12" rx="1"/>
        <rect x="55" y="104" width="6" height="12" rx="1"/><rect x="85" y="104" width="6" height="12" rx="1"/><rect x="115" y="104" width="6" height="12" rx="1"/><rect x="145" y="104" width="6" height="12" rx="1"/><rect x="175" y="104" width="6" height="12" rx="1"/>
      </g>
      <rect class="chip" x="40" y="36" width="170" height="68" rx="6"/>
      <circle cx="52" cy="48" r="2.6" fill="#8b949e"/>
      <text x="125" y="67" text-anchor="middle" class="silks" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="1">STM32</text>
      <text x="125" y="87" text-anchor="middle" class="silks" font-size="10" fill="#8b949e">ARM CORTEX-M</text>
      <path class="trace thin" d="M125 116 L125 140"/>
      <path class="v1" d="M125 116 L125 140"/>
    </g>
    <g>
      <rect class="glowB" x="246" y="32" width="178" height="76" rx="8" fill="#58e6ff"/>
      <g fill="#b58b3c">
        <rect x="265" y="24" width="6" height="12" rx="1"/><rect x="295" y="24" width="6" height="12" rx="1"/><rect x="325" y="24" width="6" height="12" rx="1"/><rect x="355" y="24" width="6" height="12" rx="1"/><rect x="385" y="24" width="6" height="12" rx="1"/>
        <rect x="265" y="104" width="6" height="12" rx="1"/><rect x="295" y="104" width="6" height="12" rx="1"/><rect x="325" y="104" width="6" height="12" rx="1"/><rect x="355" y="104" width="6" height="12" rx="1"/><rect x="385" y="104" width="6" height="12" rx="1"/>
      </g>
      <rect class="chip" x="250" y="36" width="170" height="68" rx="6"/>
      <circle cx="262" cy="48" r="2.6" fill="#8b949e"/>
      <text x="335" y="67" text-anchor="middle" class="silks" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="1">ESP32</text>
      <text x="335" y="87" text-anchor="middle" class="silks" font-size="10" fill="#8b949e">XTENSA · Wi-Fi/BT</text>
      <path class="trace thin" d="M335 116 L335 140"/>
      <path class="v2" d="M335 116 L335 140"/>
    </g>
    <g>
      <rect class="glowA" x="456" y="32" width="178" height="76" rx="8" fill="#ffc861"/>
      <g fill="#b58b3c">
        <rect x="475" y="24" width="6" height="12" rx="1"/><rect x="505" y="24" width="6" height="12" rx="1"/><rect x="535" y="24" width="6" height="12" rx="1"/><rect x="565" y="24" width="6" height="12" rx="1"/><rect x="595" y="24" width="6" height="12" rx="1"/>
        <rect x="475" y="104" width="6" height="12" rx="1"/><rect x="505" y="104" width="6" height="12" rx="1"/><rect x="535" y="104" width="6" height="12" rx="1"/><rect x="565" y="104" width="6" height="12" rx="1"/><rect x="595" y="104" width="6" height="12" rx="1"/>
      </g>
      <rect class="chip" x="460" y="36" width="170" height="68" rx="6"/>
      <circle cx="472" cy="48" r="2.6" fill="#8b949e"/>
      <text x="545" y="67" text-anchor="middle" class="silks" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="1">ATMEGA</text>
      <text x="545" y="87" text-anchor="middle" class="silks" font-size="10" fill="#8b949e">AVR 8-BIT · 4809</text>
      <path class="trace thin" d="M545 116 L545 140"/>
      <path class="v1" d="M545 116 L545 140" style="animation-delay:-1.1s"/>
    </g>
    <g>
      <rect class="glowB" x="666" y="32" width="178" height="76" rx="8" fill="#58e6ff"/>
      <g fill="#b58b3c">
        <rect x="685" y="24" width="6" height="12" rx="1"/><rect x="715" y="24" width="6" height="12" rx="1"/><rect x="745" y="24" width="6" height="12" rx="1"/><rect x="775" y="24" width="6" height="12" rx="1"/><rect x="805" y="24" width="6" height="12" rx="1"/>
        <rect x="685" y="104" width="6" height="12" rx="1"/><rect x="715" y="104" width="6" height="12" rx="1"/><rect x="745" y="104" width="6" height="12" rx="1"/><rect x="775" y="104" width="6" height="12" rx="1"/><rect x="805" y="104" width="6" height="12" rx="1"/>
      </g>
      <rect class="chip" x="670" y="36" width="170" height="68" rx="6"/>
      <circle cx="682" cy="48" r="2.6" fill="#8b949e"/>
      <text x="755" y="67" text-anchor="middle" class="silks" font-size="16" font-weight="700" fill="#e6edf3" letter-spacing="1">TINKER 2S</text>
      <text x="755" y="87" text-anchor="middle" class="silks" font-size="10" fill="#8b949e">RK3399 · ANDROID</text>
      <path class="trace thin" d="M755 116 L755 140"/>
      <path class="v2" d="M755 116 L755 140" style="animation-delay:-2s"/>
    </g>
  </g>

  <!-- Row A: LANGUAGE / PCB / TOOLS -->
  <text x="40" y="172" class="silks" font-size="11" fill="#4d5966" letter-spacing="2">── LANGUAGE ──</text>
  <text x="390" y="172" class="silks" font-size="11" fill="#4d5966" letter-spacing="2">── PCB ──</text>
  <text x="550" y="172" class="silks" font-size="11" fill="#4d5966" letter-spacing="2">── TOOLS ──</text>
  <g>
    <path class="trace thin" d="M85 180 L85 140"/><path class="v1" d="M85 180 L85 140" style="animation-delay:-0.7s"/>
    <path class="trace thin" d="M445 180 L445 140"/>
    <path class="trace thin" d="M595 180 L595 140"/><path class="v2" d="M595 180 L595 140" style="animation-delay:-0.2s"/>
  </g>
  <g class="silks" font-size="13" font-weight="700" fill="#c9d1d9" text-anchor="middle">
    <g><rect x="34" y="152" width="4" height="6" fill="#b58b3c" transform="translate(0,26)"/><rect class="chip" x="40" y="180" width="90" height="32" rx="4"/><text x="85" y="201">C</text></g>
    <g><rect class="chip" x="145" y="180" width="90" height="32" rx="4"/><text x="190" y="201">C++</text></g>
    <g><rect class="chip" x="250" y="180" width="90" height="32" rx="4"/><text x="295" y="201">JAVA</text></g>
    <g><rect class="chip" x="390" y="180" width="110" height="32" rx="4"/><text x="445" y="201">PADS</text></g>
    <g><rect class="chip" x="550" y="180" width="90" height="32" rx="4"/><text x="595" y="201">GIT</text></g>
  </g>
  <!-- crystal + LEDs on the right of row A -->
  <g>
    <rect class="chip" x="690" y="180" width="120" height="32" rx="16"/>
    <text x="750" y="201" text-anchor="middle" class="silks" font-size="10.5" fill="#8b949e">XTAL 16.000MHz</text>
    <circle class="led1" cx="836" cy="188" r="3.6" fill="#3fb950"/>
    <circle class="led2" cx="836" cy="204" r="3.6" fill="#ffc861"/>
  </g>

  <!-- Row B: IDE -->
  <text x="40" y="242" class="silks" font-size="11" fill="#4d5966" letter-spacing="2">── IDE / ENV ─────────────────────</text>
  <g class="silks" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">
    <g><rect class="chip" x="40" y="250" width="150" height="32" rx="4"/><text x="115" y="271">STM32CubeIDE</text></g>
    <g><rect class="chip" x="204" y="250" width="150" height="32" rx="4"/><text x="279" y="271">Keil uVision</text></g>
    <g><rect class="chip" x="368" y="250" width="160" height="32" rx="4"/><text x="448" y="271">Microchip Studio</text></g>
    <g><rect class="chip" x="542" y="250" width="130" height="32" rx="4"/><text x="607" y="271">Arduino IDE</text></g>
    <g><rect class="chip" x="686" y="250" width="154" height="32" rx="4"/><text x="763" y="271">Android Studio</text></g>
  </g>

  <text x="40" y="298" class="silks" font-size="9.5" fill="#4d5966" letter-spacing="1">BOM REV 3.0 · ALL COMPONENTS TESTED ✓</text>
</svg>
